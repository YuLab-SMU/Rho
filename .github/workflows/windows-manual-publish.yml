name: Windows Manual Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and release
        required: true
        default: main
      release_tag:
        description: New GitHub release tag, for example v0.2.0-dev.11
        required: true
      release_name:
        description: GitHub release title
        required: true
      prerelease:
        description: Mark the published release as a prerelease
        required: true
        type: boolean
        default: true
      run_smoke_test:
        description: Run rho-desktop.exe --smoke-test before publishing
        required: true
        type: boolean
        default: true
      run_agent_smoke_test:
        description: Run the configured network-dependent Agent smoke test
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: windows-manual-publish-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Configure hosted toolchain environment
        shell: pwsh
        run: |
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CARGO_HOME=$env:USERPROFILE\.cargo"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "RUSTUP_HOME=$env:USERPROFILE\.rustup"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "RTOOLS_BIN=C:\rtools45\x86_64-w64-mingw32.static.posix\bin"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-gnu"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.1"
          rtools-version: "45"
          use-public-rspm: true

      - name: Resolve Rscript path
        shell: pwsh
        run: |
          $rscript = (& Rscript -e "cat(normalizePath(file.path(R.home('bin'), 'Rscript.exe'), winslash='/', mustWork=TRUE))").Trim()
          if (-not $rscript) {
              throw "Could not resolve the hosted Rscript.exe path."
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "RHO_RSCRIPT=$rscript"

      - name: Install R package test and smoke dependencies
        shell: pwsh
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e "if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes')"
          Rscript -e "remotes::install_deps('r/rho.bridge', dependencies = TRUE, upgrade = 'never')"
          Rscript -e "remotes::install_deps('r/rho.agent', dependencies = TRUE, upgrade = 'never')"
          Rscript -e "stopifnot(requireNamespace('jsonlite', quietly = TRUE), requireNamespace('testthat', quietly = TRUE), requireNamespace('aisdk', quietly = TRUE))"

      - name: Install GNU Rust toolchain
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable-x86_64-pc-windows-gnu --no-self-update
          rustup default stable-x86_64-pc-windows-gnu
          rustc -vV
          cargo -vV

      - name: Verify hosted build environment
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:RTOOLS_BIN)) {
              throw "Expected Rtools bin directory was not found at $env:RTOOLS_BIN."
          }
          Rscript -e "cat(R.version.string)"
          Write-Host ""
          Write-Host "RHO_RSCRIPT=$env:RHO_RSCRIPT"
          & "$env:RTOOLS_BIN\gcc.exe" --version
          rustup show active-toolchain

      - name: Bootstrap Ark runtime
        shell: pwsh
        run: ./scripts/bootstrap-ark-windows.ps1 -RscriptPath "$env:RHO_RSCRIPT"

      - name: Enforce final-release smoke requirements
        shell: pwsh
        run: |
          $isPrerelease = [System.Convert]::ToBoolean("${{ inputs.prerelease }}")
          $runWorkspaceSmoke = [System.Convert]::ToBoolean("${{ inputs.run_smoke_test }}")
          $runAgentSmoke = [System.Convert]::ToBoolean("${{ inputs.run_agent_smoke_test }}")
          if (-not $isPrerelease -and (-not $runWorkspaceSmoke -or -not $runAgentSmoke)) {
            throw "Final releases require both Workspace and Agent smoke tests."
          }

      - name: Verify source, build installer and run release smoke tests
        id: release_checks
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          $runAgentSmoke = [System.Convert]::ToBoolean("${{ inputs.run_agent_smoke_test }}")
          if ($runAgentSmoke -and -not $env:DEEPSEEK_API_KEY) {
            throw "Agent smoke was requested, but the DEEPSEEK_API_KEY repository secret is unavailable."
          }
          $parameters = @{
            ReleaseTag = "${{ inputs.release_tag }}"
            Prerelease = "${{ inputs.prerelease }}"
            EvidencePath = "target\release-evidence\rho-0.2-release.json"
            RequireCleanWorktree = $true
            BuildInstaller = $true
            SmokeWorkspace = [System.Convert]::ToBoolean("${{ inputs.run_smoke_test }}")
            SmokeAgent = $runAgentSmoke
          }
          ./scripts/invoke-0.2-release-checks.ps1 @parameters

      - name: Create GitHub release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_TARGET: ${{ steps.release_checks.outputs.commit_sha }}
          INSTALLER_NAME: ${{ steps.release_checks.outputs.installer_name }}
          INSTALLER_SHA256: ${{ steps.release_checks.outputs.hash_value }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prerelease = String(process.env.RELEASE_PRERELEASE).toLowerCase() === "true";
            const body = [
              "GitHub-hosted windows-latest release build.",
              "",
              `- Ref: \`${{ inputs.ref }}\``,
              `- Commit: \`${process.env.RELEASE_TARGET}\``,
              `- Installer: \`${process.env.INSTALLER_NAME}\``,
              `- SHA-256: \`${process.env.INSTALLER_SHA256}\``,
            ].join("\n");
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG,
              });
              release = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                tag_name: process.env.RELEASE_TAG,
                target_commitish: process.env.RELEASE_TARGET,
                name: process.env.RELEASE_NAME,
                body,
                draft: false,
                prerelease,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
                target_commitish: process.env.RELEASE_TARGET,
                name: process.env.RELEASE_NAME,
                body,
                draft: false,
                prerelease,
              });
            }
            core.setOutput("release_id", String(release.data.id));

      - name: Upload release assets
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          INSTALLER_PATH: ${{ steps.release_checks.outputs.installer_path }}
          HASH_PATH: ${{ steps.release_checks.outputs.hash_path }}
          EVIDENCE_PATH: ${{ github.workspace }}\target\release-evidence\rho-0.2-release.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");
            const releaseId = Number(process.env.RELEASE_ID);
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });
            const existingAssets = release.data.assets || [];
            const assets = [process.env.INSTALLER_PATH, process.env.HASH_PATH, process.env.EVIDENCE_PATH];
            for (const assetPath of assets) {
              const assetName = path.basename(assetPath);
              const existing = existingAssets.find((asset) => asset.name === assetName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
              }
              const stat = fs.statSync(assetPath);
              const data = fs.readFileSync(assetPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": stat.size,
                },
              });
            }
